server:
    verbosity: 1
    use-syslog: no
    interface: 0.0.0.0
    port: 5335
    do-ip4: yes
    do-ip6: no
    do-tcp: yes
    do-udp: yes

    access-control: 127.0.0.0/8 allow
    access-control: 192.168.0.0/16 allow
    access-control: 0.0.0.0/0 refuse

    root-hints: "/etc/unbound/named.root"
    auto-trust-anchor-file: "/etc/unbound/trusted-key.key"

    hide-identity: yes
    hide-version: yes
    harden-glue: yes
    harden-dnssec-stripped: yes
    use-caps-for-id: yes

    prefetch: yes
    cache-min-ttl: 300
    cache-max-ttl: 86400
    num-threads: 2
